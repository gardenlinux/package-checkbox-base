on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
jobs:
  build:
    uses: gardenlinux/package-build/.github/workflows/build.yml@main
    with:
      release: ${{ github.ref == 'refs/heads/main' }}
      build_dep: |
        gardenlinux/package-checkbox-ng 7.2.0gl0
        gardenlinux/package-checkbox-provider-resource 7.2.0gl0
        gardenlinux/package-checkbox-support 7.2.0gl0
